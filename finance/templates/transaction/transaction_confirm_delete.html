{% extends 'base.html' %}
{% load static %}
{% block title %}Exclusão de Transação{% endblock title %}

{% block content %}
{% load crispy_forms_tags %}

<h1 class="h4">Exclusão de Transação</h1>
<ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="{% url 'dashboard' %}">Dashboard</a></li>
    <li class="breadcrumb-item"><a href="{% url 'transactions' %}">Transações</a></li>
    <li class="breadcrumb-item active">Exclusão</li>
</ol>

<div class="d-flex align-items-center justify-content-center">
    <div class="col-md-10 col-lg-10">
        <div class="border border-dark border-2 rounded-2 shadow p-3 mb-2">
            <form method="post" novalidate>
                {% csrf_token %}
                <div class="h5 mt-3 mb-3 text-danger">Tem certeza que deseja excluir a transação ?</div>
                <div class="row">
                    <div class="col-md-4">
                        <label class="form-label">Tipo</label>
                        <input class="form-control fs-5 text-danger" type="text"
                            value="{{ transaction.get_type_display }}" disabled readonly>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Tipo</label>
                        <input class="form-control fs-5 text-danger" type="text"
                            value="{{ transaction.transaction_date }}" disabled readonly>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Tipo</label>
                        <input class="form-control fs-5 text-danger" type="text" value="{{ transaction.due_date }}"
                            disabled readonly>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4">
                        <label class="form-label">Conta</label>
                        <input class="form-control fs-5 text-danger" type="text" value="{{ transaction.account }}"
                            disabled readonly>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Categoria</label>
                        <input class="form-control fs-5 text-danger" type="text" value="{{ transaction.category }}"
                            disabled readonly>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Valor</label>
                        <input class="form-control fs-5 text-danger" type="text"
                            value="{{ transaction.transaction_value }}" disabled readonly>
                    </div>
                </div>
                <button type="submit" class="btn btn-danger mt-5">
                    <i class="bi bi-trash me-2"></i>
                    Confirmar Exclusão
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
