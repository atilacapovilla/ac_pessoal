{% extends 'base.html' %}
{% load static %}
{% block title %}Mudança de Senha Completa{% endblock title %}

{% block content %}
{% load crispy_forms_tags %}

<div class="d-flex align-items-center justify-content-center full-height">
    <div class="col-md-6 col-lg-6">
        <h1 class="h3">Mudança de senha completa</h1>
        <div class="card shadow">
            <div class="card shadow">
                <div class="card-body">
                    <p>
                        Sua senha foi alterada com sucesso. Por favor faça login novamente.
                    </p>
                    <a href="{% url 'login' %}" class="btn btn-lg btn-primary">
                        <i class="bi-box-arrow-in-right me-2"></i>
                        Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
