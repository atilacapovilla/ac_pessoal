{% extends 'base.html' %}
{% load static %}
{% block title %}Exclusão de Curso{% endblock title %}

{% block content %}
{% load crispy_forms_tags %}

<h1 class="h5">Exclusão de Curso</h1>
<ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="{% url 'dashboard' %}">Dashboard</a></li>
    <li class="breadcrumb-item"><a href="{% url 'courses' %}">Cursos</a></li>
    <li class="breadcrumb-item active">Exclusão</li>
</ol>

<div class="d-flex align-items-center justify-content-center">
    <div class="col-md-10 col-lg-10">
        <div class="border border-dark border-2 rounded-2 shadow p-3 mb-2">
            <form method="post" novalidate>
                {% csrf_token %}
                <div class="h5 mt-3 mb-3 text-danger">Tem certeza que deseja excluir o curso ?</div>
                <div class="row">
                    <div class="col-md-12">
                        <input class="form-control fs-4 text-danger" type="text" value="{{ course.title }}" disabled
                            readonly>
                    </div>
                </div>
                <button type="submit" class="btn btn-danger mt-5">
                    <i class="bi bi-trash me-2"></i>
                    Confirmar Exclusão
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
