{%extends 'base.html'%}
{% load static %}

{%block content%}
<div class="card-header-custom">
    <div class="row">
        <div class="d-flex justify-content-between align-items-center">
            <h2 class="h5 text-primary">
                Curso : {{ note.course }}
            </h2>
            <a href="{% url 'notes' note.course.id %}" class="btn btn-secondary h3">
                <i class="bi-arrow-left-square me-2"></i>
                Retornar para lista de notas
            </a>
        </div>
        <h2 class="h5 text-primary">
            {{ note.title }}
        </h2>
        <div class="d-flex justify-content-between align-items-center">
            <span>
                <i class="bi-person-check me-2"></i>
                {{ note.user | title }}
            </span>
            <span>
                <i class="bi-calendar-check me-2"></i>
                Criada :
                {{ note.create_at|date:"d M Y" }}
            </span>
            <span>
                <i class="bi-calendar-check me-2"></i>
                Alterada :
                {{ note.update_at|date:"d M Y" }}
            </span>
        </div>
    </div>
</div>

<div class="col-md-12 col-lg-12mt-3">
    <div class="card shadow">
        <div class="card-body">
            {{ note.content|safe}}
        </div>
    </div>
</div>
{%endblock content%}
